<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TradeLog</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0c10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-adapter-date-fns/3.0.0/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0c10;
    --card: #111318;
    --card2: #181c24;
    --border: #1f2535;
    --accent: #00e5ff;
    --accent2: #ff4d6d;
    --green: #00e096;
    --red: #ff4d6d;
    --yellow: #ffd166;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding-bottom: calc(80px + env(safe-area-inset-bottom, 20px));
  }

  /* NAV */
  .top-bar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-bar h1 { font-family: var(--mono); font-size: 14px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .top-bar .sub { font-size: 11px; color: var(--muted); }

  .bottom-nav {
    position: fixed;
    bottom: env(safe-area-inset-bottom, 20px);
    left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    padding: 12px 4px 10px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: color .2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 20px; height: 20px; }

  /* PAGES */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* CARDS */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* STATS GRID */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 12px;
  }
  .stat-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; letter-spacing: .5px; }
  .stat-val { font-family: var(--mono); font-size: 18px; font-weight: 700; }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-val.yellow { color: var(--yellow); }
  .stat-val.accent { color: var(--accent); }

  /* P&L BADGE */
  .pl-badge {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    display: inline-block;
  }
  .pl-badge.pos { background: rgba(0,224,150,.15); color: var(--green); }
  .pl-badge.neg { background: rgba(255,77,109,.15); color: var(--red); }

  /* TRADE LIST */
  .trade-item {
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .2s;
  }
  .trade-item:active { background: rgba(0,229,255,.03); }
  .trade-item:last-child { border-bottom: none; }
  .trade-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .trade-date { font-family: var(--mono); font-size: 12px; color: var(--accent); }
  .trade-day { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .trade-capital { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .trade-comment { font-size: 12px; color: var(--text); margin-top: 6px; opacity: .8; line-height: 1.4; }
  .trade-analysis { font-size: 11px; margin-top: 6px; padding: 8px 10px; border-radius: 8px; line-height: 1.5; }
  .trade-analysis.warn { background: rgba(255,209,102,.08); color: var(--yellow); border-left: 3px solid var(--yellow); }
  .trade-analysis.good { background: rgba(0,224,150,.08); color: var(--green); border-left: 3px solid var(--green); }
  .trade-analysis.bad { background: rgba(255,77,109,.08); color: var(--red); border-left: 3px solid var(--red); }
  .trade-analysis.neutral { background: var(--card2); color: var(--muted); border-left: 3px solid var(--border); }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 11px; color: var(--muted); letter-spacing: .5px; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    padding: 11px 13px;
    outline: none;
    transition: border-color .2s;
  }
  .form-input:focus { border-color: var(--accent); }
  textarea.form-input { resize: vertical; min-height: 80px; }
  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    padding: 15px;
    cursor: pointer;
    letter-spacing: 1px;
    margin-top: 4px;
    transition: opacity .2s;
  }
  .submit-btn:active { opacity: .8; }
  
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .btn-row button {
    flex: 1;
    border: none;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    padding: 15px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: opacity .2s;
  }
  .btn-row button:active { opacity: .8; }
  .btn-update { background: var(--accent); color: #000; }
  .btn-delete { background: var(--red); color: #fff; }
  .btn-cancel { background: var(--card2); color: var(--text); border: 1px solid var(--border); }

  /* EDIT MODE INDICATOR */
  .edit-mode-banner {
    background: rgba(0,229,255,.1);
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 12px;
    color: var(--accent);
    display: none;
  }
  .edit-mode-banner.active { display: block; }

  /* CHART */
  .chart-wrap { position: relative; height: 200px; }

  /* MONTH PILLS */
  .month-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .month-pill {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    color: var(--muted);
  }
  .month-pill.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* SUMMARY ROW */
  .summary-row {
    display: flex;
    gap: 8px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .summary-month { font-family: var(--mono); font-size: 13px; min-width: 40px; color: var(--accent); }
  .summary-data { flex: 1; }
  .summary-pl { font-family: var(--mono); font-size: 14px; font-weight: 700; }
  .summary-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* STREAK */
  .streak-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .streak-dot {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    font-family: var(--mono);
  }
  .streak-dot.win { background: rgba(0,224,150,.2); color: var(--green); }
  .streak-dot.loss { background: rgba(255,77,109,.2); color: var(--red); }

  /* FILTER PILLS */
  .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .filter-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 11px;
    cursor: pointer;
    transition: all .15s;
    color: var(--muted);
  }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* TOAST */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: var(--card);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--accent);
    z-index: 200;
    opacity: 0;
    transition: all .3s;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 13px; }

  /* AUTH */
  .auth-gate { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; padding:20px; }
  .auth-gate h2 { font-family:var(--mono); color:var(--accent); font-size:18px; margin-bottom:8px; }
  .auth-gate p { color:var(--muted); font-size:13px; margin-bottom:24px; }
  .google-btn { background:#fff; color:#333; border:none; border-radius:10px; padding:14px 28px; font-size:14px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:10px; }
  .google-btn:active { opacity:.8; }
  .user-bar { display:flex; align-items:center; gap:8px; }
  .user-avatar { width:28px; height:28px; border-radius:50%; border:2px solid var(--accent); }
  .user-name { font-size:11px; color:var(--muted); max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .logout-btn { background:none; border:1px solid var(--border); border-radius:6px; color:var(--muted); font-size:10px; padding:4px 8px; cursor:pointer; }
  .sync-dot { width:8px; height:8px; border-radius:50%; background:var(--green); display:inline-block; margin-right:4px; }
  .sync-dot.offline { background:var(--yellow); }
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="authGate" class="auth-gate">
  <h2>TRADELOG</h2>
  <p>Track • Analyze • Improve</p>
  <button class="google-btn" onclick="googleSignIn()">
    <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Sign in with Google
  </button>
</div>

<!-- APP (hidden until auth) -->
<div id="appMain" style="display:none;">

<!-- TOP BAR -->
<div class="top-bar">
  <div>
    <h1>TRADELOG</h1>
    <div class="sub"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">Synced</span></div>
  </div>
  <div class="user-bar">
    <img class="user-avatar" id="userAvatar" src="" alt="">
    <div>
      <div class="user-name" id="userName"></div>
      <button class="logout-btn" onclick="signOut()">Logout</button>
    </div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div id="pageDashboard" class="page active">
  <div class="card">
    <div class="card-title">OVERVIEW</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total P&L</div>
        <div class="stat-val" id="totalPL">₹0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Win Rate</div>
        <div class="stat-val accent" id="winRate">0%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Win</div>
        <div class="stat-val green" id="avgWin">₹0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Loss</div>
        <div class="stat-val red" id="avgLoss">₹0</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">CUMULATIVE P&L</div>
    <div class="chart-wrap">
      <canvas id="plChart"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-title">RECENT STREAK</div>
    <div class="streak-row" id="streakRow"></div>
  </div>

  <div class="card">
    <div class="card-title">MONTHLY BREAKDOWN</div>
    <div id="monthlySummary"></div>
  </div>
</div>

<!-- JOURNAL PAGE -->
<div id="pageJournal" class="page">
  <div class="card">
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('win', this)">Wins</button>
      <button class="filter-btn" onclick="setFilter('loss', this)">Losses</button>
      <button class="filter-btn" onclick="setFilter('flag', this)">Flagged</button>
    </div>
    <div id="journalList"></div>
  </div>
</div>

<!-- ADD ENTRY PAGE -->
<div id="pageAdd" class="page">
  <div class="card">
    <div class="edit-mode-banner" id="editModeBanner">
      ✏️ Editing trade entry
    </div>
    
    <div class="form-group">
      <label class="form-label">DATE</label>
      <input type="date" class="form-input" id="entryDate" value="">
    </div>
    <div class="form-group">
      <label class="form-label">CAPITAL (₹)</label>
      <input type="number" class="form-input" id="entryCapital" placeholder="100000">
    </div>
    <div class="form-group">
      <label class="form-label">P/L (₹)</label>
      <input type="number" class="form-input" id="entryPL" placeholder="2500">
    </div>
    <div class="form-group">
      <label class="form-label">COMMENT (Optional)</label>
      <textarea class="form-input" id="entryComment" placeholder="Trade notes, strategy used, market conditions..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">ANALYSIS (Optional)</label>
      <textarea class="form-input" id="entryAnalysis" placeholder="Self-analysis with emojis: ✅ Good execution, ⚠️ Warning signs, 🚨 Rule broken..."></textarea>
    </div>
    
    <div id="addModeButtons">
      <button class="submit-btn" onclick="saveEntry()">ADD ENTRY</button>
    </div>
    
    <div id="editModeButtons" style="display: none;">
      <div class="btn-row">
        <button class="btn-update" onclick="updateEntry()">UPDATE</button>
        <button class="btn-delete" onclick="deleteEntry()">DELETE</button>
      </div>
      <button class="btn-cancel" onclick="cancelEdit()" style="width: 100%; margin-top: 10px;">CANCEL</button>
    </div>
  </div>
</div>

<!-- REPORTS PAGE -->
<div id="pageReports" class="page">
  <div class="card">
    <div class="card-title">MONTHLY P&L</div>
    <div class="chart-wrap">
      <canvas id="monthChart"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-title">DAY OF WEEK</div>
    <div class="chart-wrap">
      <canvas id="dayChart"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-title">WIN/LOSS RATIO</div>
    <div class="chart-wrap" style="height: 180px;">
      <canvas id="pieChart"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-title">RULES BROKEN</div>
    <div id="rulesBroken"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="goPage('Dashboard')">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    Dashboard
  </button>
  <button class="nav-btn" onclick="goPage('Journal')">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
    Journal
  </button>
  <button class="nav-btn" onclick="goPage('Add')">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    Add
  </button>
  <button class="nav-btn" onclick="goPage('Reports')">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
    Reports
  </button>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✓ Entry saved</div>

</div><!-- /appMain -->

<script>
// ── FIREBASE INIT ──────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyDkJmf1jT7mx2yFH7asHcDJRihiDx-XiTY",
  authDomain: "my-trading-diary-3d587.firebaseapp.com",
  projectId: "my-trading-diary-3d587",
  storageBucket: "my-trading-diary-3d587.firebasestorage.app",
  messagingSenderId: "735077660061",
  appId: "1:735077660061:web:8fd861a9eaf9267270ab74"
});
const auth = firebase.auth();
const db = firebase.firestore();
db.enablePersistence().catch(() => {});

let currentUser = null;

// ── AUTH ────────────────────────────────────────────────────────────────────
function googleSignIn() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => {
    // Fallback to redirect on mobile
    if (e.code === 'auth/popup-blocked' || e.code === 'auth/popup-closed-by-user') {
      auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());
    } else { alert('Sign-in failed: ' + e.message); }
  });
}
function signOut() { auth.signOut(); }

auth.onAuthStateChanged(user => {
  currentUser = user;
  if (user) {
    document.getElementById('authGate').style.display = 'none';
    document.getElementById('appMain').style.display = 'block';
    document.getElementById('userAvatar').src = user.photoURL || '';
    document.getElementById('userName').textContent = user.displayName || user.email;
    loadTradesFromCloud();
  } else {
    document.getElementById('authGate').style.display = 'flex';
    document.getElementById('appMain').style.display = 'none';
    trades = [];
  }
});

// ── STORAGE (Firestore + localStorage fallback) ────────────────────────────
function tradesRef() {
  return db.collection('users').doc(currentUser.uid).collection('trades');
}

function loadTrades() {
  const stored = localStorage.getItem('trades_' + (currentUser?.uid || 'local'));
  return stored ? JSON.parse(stored) : [];
}
function saveTradesToLocal(data) {
  localStorage.setItem('trades_' + (currentUser?.uid || 'local'), JSON.stringify(data));
}

async function loadTradesFromCloud() {
  setSyncStatus('syncing');
  try {
    const snap = await tradesRef().orderBy('date').get();
    trades = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
    saveTradesToLocal(trades);
    setSyncStatus('online');
  } catch(e) {
    console.warn('Cloud load failed, using local:', e);
    trades = loadTrades();
    setSyncStatus('offline');
  }
  renderDashboard();
}

async function saveTradeToCloud(trade) {
  setSyncStatus('syncing');
  try {
    const ref = await tradesRef().add(trade);
    trade._id = ref.id;
    setSyncStatus('online');
  } catch(e) {
    console.warn('Cloud save failed:', e);
    setSyncStatus('offline');
  }
}

async function updateTradeInCloud(id, trade) {
  setSyncStatus('syncing');
  try {
    await tradesRef().doc(id).set(trade);
    setSyncStatus('online');
  } catch(e) {
    console.warn('Cloud update failed:', e);
    setSyncStatus('offline');
  }
}

async function deleteTradeFromCloud(id) {
  setSyncStatus('syncing');
  try {
    await tradesRef().doc(id).delete();
    setSyncStatus('online');
  } catch(e) {
    console.warn('Cloud delete failed:', e);
    setSyncStatus('offline');
  }
}

function setSyncStatus(s) {
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  if (s === 'online') { dot.className = 'sync-dot'; label.textContent = 'Synced'; }
  else if (s === 'offline') { dot.className = 'sync-dot offline'; label.textContent = 'Offline'; }
  else { dot.className = 'sync-dot offline'; label.textContent = 'Syncing...'; }
}

let trades = loadTrades();
let journalFilter = 'all';
let editingIndex = null;  // Track which trade is being edited

// Set today's date as default
document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];

// ── NAVIGATION ─────────────────────────────────────────────────────────────
function goPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  
  document.getElementById('page' + name).classList.add('active');
  event.target.closest('.nav-btn').classList.add('active');

  if (name === 'Dashboard') renderDashboard();
  if (name === 'Journal') renderJournal();
  if (name === 'Reports') renderReports();
  if (name === 'Add') {
    // Reset form when opening Add page (if not editing)
    if (editingIndex === null) {
      cancelEdit();
    }
  }
}

// ── FORMATTING ─────────────────────────────────────────────────────────────
const fmt = v => (v >= 0 ? '+' : '') + '₹' + v.toLocaleString('en-IN');
const fmtK = v => Math.abs(v) >= 1000 ? (v / 1000).toFixed(1) + 'K' : v.toFixed(0);

// ── CHARTS ─────────────────────────────────────────────────────────────────
const charts = { pl: null, month: null, day: null, pie: null };

// ── DASHBOARD ──────────────────────────────────────────────────────────────
function renderDashboard() {
  const validTrades = trades.filter(t => typeof t.pl === 'number' && !isNaN(t.pl) && t.capital > 0);
  if (!validTrades.length) {
    document.getElementById('totalPL').textContent = '₹0';
    document.getElementById('winRate').textContent = '0%';
    document.getElementById('avgWin').textContent = '₹0';
    document.getElementById('avgLoss').textContent = '₹0';
    document.getElementById('streakRow').innerHTML = '<div class="empty">No trades yet</div>';
    document.getElementById('monthlySummary').innerHTML = '<div class="empty">No data</div>';
    return;
  }

  const total = validTrades.reduce((sum, t) => sum + t.pl, 0);
  const wins = validTrades.filter(t => t.pl > 0);
  const losses = validTrades.filter(t => t.pl < 0);
  const avgWin = wins.length ? wins.reduce((s, t) => s + t.pl, 0) / wins.length : 0;
  const avgLoss = losses.length ? losses.reduce((s, t) => s + t.pl, 0) / losses.length : 0;
  const winRate = (wins.length / validTrades.length * 100).toFixed(0);

  document.getElementById('totalPL').textContent = fmt(total);
  document.getElementById('totalPL').className = 'stat-val ' + (total >= 0 ? 'green' : 'red');
  document.getElementById('winRate').textContent = winRate + '%';
  document.getElementById('avgWin').textContent = fmt(avgWin);
  document.getElementById('avgLoss').textContent = fmt(avgLoss);

  // Cumulative P&L chart
  const sorted = [...validTrades].sort((a, b) => a.date.localeCompare(b.date));
  let cum = 0;
  const chartData = sorted.map(t => { cum += t.pl; return { x: t.date, y: cum }; });

  if (charts.pl) charts.pl.destroy();
  charts.pl = new Chart(document.getElementById('plChart'), {
    type: 'line',
    data: {
      datasets: [{
        data: chartData,
        borderColor: '#00e5ff',
        backgroundColor: 'rgba(0,229,255,.1)',
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointRadius: 3,
        pointBackgroundColor: '#00e5ff'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => fmt(ctx.raw.y) },
        backgroundColor: '#181c24', titleColor: '#00e5ff', bodyColor: '#e2e8f0',
        borderColor: '#1f2535', borderWidth: 1
      }},
      scales: {
        x: { type: 'time', time: { unit: 'day' }, ticks: { color: '#64748b', font: { size: 9 }, maxTicksLimit: 6 }, grid: { color: '#1f2535' } },
        y: { ticks: { color: '#64748b', font: { size: 9 }, callback: v => fmtK(v) }, grid: { color: '#1f2535' } }
      }
    }
  });

  // Streak
  const recent = sorted.slice(-20);
  document.getElementById('streakRow').innerHTML = recent.map(t =>
    `<div class="streak-dot ${t.pl>=0?'win':'loss'}" title="${t.date}: ${fmt(t.pl)}">${t.pl>=0?'W':'L'}</div>`
  ).join('');

  // Monthly summary
  const months = {};
  validTrades.forEach(t => {
    const m = new Date(t.date).toLocaleString('en',{month:'short',year:'2-digit'});
    if (!months[m]) months[m] = { pl:0, wins:0, total:0 };
    months[m].pl += t.pl;
    months[m].total++;
    if (t.pl > 0) months[m].wins++;
  });
  document.getElementById('monthlySummary').innerHTML = Object.entries(months).map(([m,d]) =>
    `<div class="summary-row">
      <div class="summary-month">${m}</div>
      <div class="summary-data">
        <div class="summary-pl" style="color:${d.pl>=0?'var(--green)':'var(--red)'}">${fmt(d.pl)}</div>
        <div class="summary-meta">${d.wins}W / ${d.total-d.wins}L · WR ${Math.round(d.wins/d.total*100)}%</div>
      </div>
    </div>`
  ).join('');
}

// ── JOURNAL ────────────────────────────────────────────────────────────────
function setFilter(f, el) {
  journalFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderJournal();
}

function renderJournal() {
  const validTrades = trades.filter(t => typeof t.pl === 'number' && !isNaN(t.pl) && t.capital > 0);
  let filtered = [...validTrades].sort((a,b) => b.date.localeCompare(a.date));
  if (journalFilter === 'win') filtered = filtered.filter(t => t.pl > 0);
  if (journalFilter === 'loss') filtered = filtered.filter(t => t.pl < 0);
  if (journalFilter === 'flag') filtered = filtered.filter(t => t.analysis && (t.analysis.includes('⚠️') || t.analysis.includes('🚨')));

  if (!filtered.length) {
    document.getElementById('journalList').innerHTML = '<div class="empty">No entries found</div>';
    return;
  }

  document.getElementById('journalList').innerHTML = filtered.map(t => {
    const originalIndex = trades.findIndex(orig => 
      orig._id ? orig._id === t._id : (orig.date === t.date && orig.capital === t.capital && orig.pl === t.pl)
    );
    const analysisClass = !t.analysis ? '' : t.analysis.includes('✅') ? 'good' : t.analysis.includes('🚨') ? 'bad' : t.analysis.includes('⚠️') ? 'warn' : 'neutral';
    return `<div class="trade-item" onclick="editTrade(${originalIndex})">
      <div class="trade-row1">
        <div>
          <div class="trade-date">${t.date}</div>
          <div class="trade-day">${t.day || ''}</div>
        </div>
        <span class="pl-badge ${t.pl>=0?'pos':'neg'}">${fmt(t.pl)}</span>
      </div>
      <div class="trade-capital">Capital: ₹${(t.capital/100000).toFixed(1)}L · ${t.pct}%</div>
      ${t.comment ? `<div class="trade-comment">${t.comment}</div>` : ''}
      ${t.analysis ? `<div class="trade-analysis ${analysisClass}">${t.analysis}</div>` : ''}
    </div>`;
  }).join('');
}

// ── EDIT TRADE ─────────────────────────────────────────────────────────────
function editTrade(index) {
  editingIndex = index;
  const trade = trades[index];
  
  // Fill form with existing data
  document.getElementById('entryDate').value = trade.date;
  document.getElementById('entryCapital').value = trade.capital;
  document.getElementById('entryPL').value = trade.pl;
  document.getElementById('entryComment').value = trade.comment || '';
  document.getElementById('entryAnalysis').value = trade.analysis || '';
  
  // Switch to edit mode
  document.getElementById('editModeBanner').classList.add('active');
  document.getElementById('addModeButtons').style.display = 'none';
  document.getElementById('editModeButtons').style.display = 'block';
  
  // Navigate to Add page
  goPage('Add');
}

function updateEntry() {
  if (editingIndex === null) return;
  
  const date = document.getElementById('entryDate').value;
  const capital = parseFloat(document.getElementById('entryCapital').value);
  const pl = parseFloat(document.getElementById('entryPL').value);
  const comment = document.getElementById('entryComment').value.trim();
  const analysis = document.getElementById('entryAnalysis').value.trim();

  if (!date || isNaN(capital) || isNaN(pl)) {
    alert('Please fill in Date, Capital, and P/L fields.');
    return;
  }

  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const d = new Date(date);
  const pct = capital ? parseFloat(((pl/capital)*100).toFixed(2)) : 0;

  const updatedTrade = { date, day: dayNames[d.getDay()], capital, pl, pct, comment, analysis };
  const cloudId = trades[editingIndex]._id;
  trades[editingIndex] = { _id: cloudId, ...updatedTrade };
  saveTradesToLocal(trades);
  if (cloudId) updateTradeInCloud(cloudId, updatedTrade);

  showToast('✓ Entry updated');
  cancelEdit();
  renderDashboard();
  renderJournal();
}

function deleteEntry() {
  if (editingIndex === null) return;
  
  if (confirm('Delete this trade entry?')) {
    const cloudId = trades[editingIndex]._id;
    trades.splice(editingIndex, 1);
    saveTradesToLocal(trades);
    if (cloudId) deleteTradeFromCloud(cloudId);
    
    showToast('✓ Entry deleted');
    cancelEdit();
    renderDashboard();
    renderJournal();
  }
}

function cancelEdit() {
  editingIndex = null;
  
  // Clear form
  document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('entryCapital').value = '';
  document.getElementById('entryPL').value = '';
  document.getElementById('entryComment').value = '';
  document.getElementById('entryAnalysis').value = '';
  
  // Switch to add mode
  document.getElementById('editModeBanner').classList.remove('active');
  document.getElementById('addModeButtons').style.display = 'block';
  document.getElementById('editModeButtons').style.display = 'none';
}

// ── ADD ENTRY ──────────────────────────────────────────────────────────────
function saveEntry() {
  const date = document.getElementById('entryDate').value;
  const capital = parseFloat(document.getElementById('entryCapital').value);
  const pl = parseFloat(document.getElementById('entryPL').value);
  const comment = document.getElementById('entryComment').value.trim();
  const analysis = document.getElementById('entryAnalysis').value.trim();

  if (!date || isNaN(capital) || isNaN(pl)) {
    alert('Please fill in Date, Capital, and P/L fields.');
    return;
  }

  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const d = new Date(date);
  const pct = capital ? parseFloat(((pl/capital)*100).toFixed(2)) : 0;

  const tradeObj = { date, day: dayNames[d.getDay()], capital, pl, pct, comment, analysis };
  trades.push(tradeObj);
  saveTradesToLocal(trades);
  saveTradeToCloud(tradeObj);

  document.getElementById('entryCapital').value = '';
  document.getElementById('entryPL').value = '';
  document.getElementById('entryComment').value = '';
  document.getElementById('entryAnalysis').value = '';

  showToast('✓ Entry saved');
  renderDashboard();
  renderJournal();
}

function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── REPORTS ────────────────────────────────────────────────────────────────
function renderReports() {
  const validTrades = trades.filter(t => typeof t.pl === 'number' && !isNaN(t.pl) && t.capital > 0);

  // Monthly chart
  const months = {};
  validTrades.forEach(t => {
    const m = new Date(t.date).toLocaleString('en',{month:'short'});
    if (!months[m]) months[m] = 0;
    months[m] += t.pl;
  });
  const mLabels = Object.keys(months);
  const mData = Object.values(months);

  if (charts.month) charts.month.destroy();
  charts.month = new Chart(document.getElementById('monthChart'), {
    type: 'bar',
    data: {
      labels: mLabels,
      datasets: [{
        data: mData,
        backgroundColor: mData.map(v => v >= 0 ? 'rgba(0,224,150,.7)' : 'rgba(255,77,109,.7)'),
        borderRadius: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => fmt(ctx.raw) }, backgroundColor:'#181c24',titleColor:'#00e5ff',bodyColor:'#e2e8f0',borderColor:'#1f2535',borderWidth:1 }},
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { display: false } },
        y: { ticks: { color: '#64748b', font: { size: 9 }, callback: v => fmtK(v) }, grid: { color: '#1f2535' } }
      }
    }
  });

  // Day of week
  const days = { Mon:0, Tue:0, Wed:0, Thu:0, Fri:0 };
  validTrades.forEach(t => {
    const d = new Date(t.date).toLocaleString('en',{weekday:'short'});
    if (days[d] !== undefined) days[d] += t.pl;
  });
  const dLabels = Object.keys(days);
  const dData = Object.values(days);

  if (charts.day) charts.day.destroy();
  charts.day = new Chart(document.getElementById('dayChart'), {
    type: 'bar',
    data: {
      labels: dLabels,
      datasets: [{
        data: dData,
        backgroundColor: dData.map(v => v >= 0 ? 'rgba(0,229,255,.6)' : 'rgba(255,77,109,.6)'),
        borderRadius: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => fmt(ctx.raw) }, backgroundColor:'#181c24',titleColor:'#00e5ff',bodyColor:'#e2e8f0',borderColor:'#1f2535',borderWidth:1 }},
      scales: {
        x: { ticks: { color: '#64748b' }, grid: { display: false } },
        y: { ticks: { color: '#64748b', font:{size:9}, callback: v => fmtK(v) }, grid: { color: '#1f2535' } }
      }
    }
  });

  // Pie
  const wins = validTrades.filter(t=>t.pl>0).length;
  const losses = validTrades.filter(t=>t.pl<0).length;
  if (charts.pie) charts.pie.destroy();
  charts.pie = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: {
      labels: ['Wins','Losses'],
      datasets: [{ data: [wins, losses], backgroundColor: ['rgba(0,224,150,.8)','rgba(255,77,109,.8)'], borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#e2e8f0', font: { size: 12 } } },
        tooltip: { callbacks: { label: ctx => `${ctx.label}: ${ctx.raw} (${Math.round(ctx.raw/(wins+losses)*100)}%)` }, backgroundColor:'#181c24',titleColor:'#00e5ff',bodyColor:'#e2e8f0',borderColor:'#1f2535',borderWidth:1 }
      }
    }
  });

  // Rules broken
  const rules = [
    { label: '⚠️ Revenge Trading', count: validTrades.filter(t=>t.analysis?.includes('REVENGE')).length },
    { label: '⚠️ No Stop-Loss', count: validTrades.filter(t=>t.comment?.toLowerCase().includes('stoploss')||t.analysis?.toLowerCase().includes('stop-loss')).length },
    { label: '⚠️ Distracted Trading', count: validTrades.filter(t=>t.analysis?.includes('DISTRACTED')).length },
    { label: '⚠️ Overconfidence', count: validTrades.filter(t=>t.analysis?.includes('overconfidence')).length },
    { label: '⚠️ Ego / External Pressure', count: validTrades.filter(t=>t.analysis?.includes('ego')||t.analysis?.includes('pressure')).length },
    { label: '⚠️ Chasing After Loss', count: validTrades.filter(t=>t.analysis?.includes('CHASING')).length },
  ].filter(r=>r.count>0);

  document.getElementById('rulesBroken').innerHTML = rules.map(r =>
    `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span style="color:var(--yellow)">${r.label}</span>
      <span style="font-family:var(--mono);color:var(--red)">${r.count}x</span>
    </div>`
  ).join('') || '<div style="color:var(--muted);font-size:13px;padding:8px 0">No flagged entries found.</div>';
}

// ── INITIAL RENDER ─────────────────────────────────────────────────────────
renderDashboard();

// ── PWA SERVICE WORKER ─────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
